name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: erp-app
        run: npm install --ignore-scripts

      - name: Install native modules for Electron
        working-directory: erp-app
        run: npx electron-builder install-app-deps

      - name: Build renderer (Vite)
        working-directory: erp-app
        run: npx vite build

      - name: Build electron (TypeScript)
        working-directory: erp-app
        run: npx tsc -p tsconfig.electron.json

      - name: Build Windows installer
        working-directory: erp-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --x64

      - name: Rename installer with version
        working-directory: erp-app/release
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Get-ChildItem -Filter "*.exe" | Rename-Item -NewName { "Mizan-ERP-Setup-$version.exe" }

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mizan-ERP-Windows-Setup
          path: erp-app/release/*.exe
          retention-days: 30

      - name: Delete old releases
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          gh release list --repo md-erg/mizan --limit 100 --json tagName \
            | jq -r '.[].tagName' \
            | grep -v "${{ github.ref_name }}" \
            | while read tag; do
                echo "Deleting release: $tag"
                gh release delete "$tag" --repo md-erg/mizan --yes --cleanup-tag || true
              done
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: erp-app/release/*.exe
          name: Mizan ERP ${{ github.ref_name }}
          body: |
            Mizan ERP ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
